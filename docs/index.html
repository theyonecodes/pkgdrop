<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pkgdrop PM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --g1: 4px; --g2: 8px; --g3: 12px; --g4: 16px; --g5: 20px; --g6: 24px; --g8: 32px;
    --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --surface-0: #0b0e14; --surface-1: #111620; --surface-2: #171c28; --surface-3: #1e2433;
    --surface-4: #272e40; --border: rgba(255,255,255,0.10);
    --text-primary: #eef1f6; --text-secondary: #94a3b8; --text-tertiary: #64748b;
    --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.14); --accent-glow: rgba(59,130,246,0.28);
    --green: #22c55e; --green-dim: rgba(34,197,94,0.14);
    --yellow: #eab308; --yellow-dim: rgba(234,179,8,0.14);
    --red: #ef4444; --red-dim: rgba(239,68,68,0.14);
    --purple: #a855f7; --purple-dim: rgba(168,85,247,0.14);
    --cyan: #06b6d4; --cyan-dim: rgba(6,182,212,0.14);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.4); --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --sidebar-w: 232px; --topbar-h: 52px;
}
.light {
    --surface-0: #f1f3f7; --surface-1: #ffffff; --surface-2: #f8f9fb; --surface-3: #eef0f4;
    --surface-4: #dde1e8; --border: rgba(0,0,0,0.08);
    --text-primary: #0f172a; --text-secondary: #475569; --text-tertiary: #94a3b8;
    --accent: #2563eb; --accent-dim: rgba(37,99,235,0.08); --accent-glow: rgba(37,99,235,0.18);
    --green: #16a34a; --green-dim: rgba(22,163,74,0.08);
    --yellow: #ca8a04; --yellow-dim: rgba(202,138,4,0.08);
    --red: #dc2626; --red-dim: rgba(220,38,38,0.08);
    --purple: #7c3aed; --purple-dim: rgba(124,58,237,0.08);
    --cyan: #0891b2; --cyan-dim: rgba(8,145,178,0.08);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}
body { font-family: var(--font); background: var(--surface-0); color: var(--text-primary); height: 100vh; overflow: hidden; font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.app { display: flex; height: 100vh; }

.sidebar { width: var(--sidebar-w); background: var(--surface-1); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: var(--g4) var(--g3); flex-shrink: 0; }
.brand { display: flex; align-items: center; gap: var(--g2); padding: var(--g2) var(--g3); margin-bottom: var(--g8); }
.brand-mark { width: 28px; height: 28px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #fff; }
.brand-name { font-weight: 700; font-size: 14px; color: var(--text-primary); letter-spacing: -0.2px; }
.nav-group { margin-bottom: var(--g5); }
.nav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); padding: 0 var(--g3); margin-bottom: 6px; }
.nav-item { padding: 7px var(--g3); border-radius: var(--r-sm); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: all 0.15s var(--ease); margin-bottom: 1px; display: flex; align-items: center; gap: var(--g2); }
.nav-item:hover { background: var(--accent-dim); color: var(--text-primary); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
.nav-item svg { width: 15px; height: 15px; opacity: 0.6; flex-shrink: 0; }
.nav-item.active svg { opacity: 1; }
.nav-spacer { flex: 1; }
.nav-item.danger { color: var(--red); }
.nav-item.danger:hover { background: var(--red-dim); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar { padding: 0 var(--g5); height: var(--topbar-h); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: var(--surface-1); }
.search-box { position: relative; width: 300px; }
.search-box svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none; }
.search { width: 100%; padding: 7px 10px 7px 32px; border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--surface-2); color: var(--text-primary); font-size: 12px; font-family: var(--font); transition: border-color 0.15s var(--ease); }
.search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search::placeholder { color: var(--text-tertiary); }
.top-actions { display: flex; align-items: center; gap: var(--g2); }

.view-area { flex: 1; overflow-y: auto; padding: var(--g4) var(--g5); scroll-behavior: smooth; }
.view { display: none; animation: fadeUp 0.25s var(--ease); }
.view.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.btn { padding: 7px 14px; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface-2); color: var(--text-primary); font-size: 12px; font-weight: 500; font-family: var(--font); cursor: pointer; transition: all 0.15s var(--ease); display: inline-flex; align-items: center; gap: var(--g2); }
.btn:hover { background: var(--surface-3); border-color: rgba(255,255,255,0.15); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); background: var(--accent); }
.btn-ghost { border: none; background: none; color: var(--text-secondary); }
.btn-ghost:hover { color: var(--text-primary); background: var(--accent-dim); }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red-dim); }

.input { padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--surface-2); color: var(--text-primary); font-size: 12px; font-family: var(--font); width: 100%; transition: border-color 0.15s var(--ease); }
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
textarea.input { min-height: 60px; resize: vertical; }
label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }

.tag { padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.tag-p0 { background: var(--red-dim); color: var(--red); }
.tag-p1 { background: var(--yellow-dim); color: var(--yellow); }
.tag-p2 { background: var(--green-dim); color: var(--green); }
.tag-epic { background: var(--purple-dim); color: var(--purple); }
.tag-required { background: var(--red-dim); color: var(--red); }
.tag-optional { background: var(--yellow-dim); color: var(--yellow); }
.tag-auto { background: var(--cyan-dim); color: var(--cyan); }

.board { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--g3); min-height: 400px; }
.col { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-lg); padding: var(--g3); display: flex; flex-direction: column; }
.col-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--g3); padding-bottom: var(--g2); border-bottom: 1px solid var(--border); }
.col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); }
.col-count { font-size: 10px; font-weight: 700; color: var(--text-tertiary); background: var(--surface-3); padding: 1px 7px; border-radius: 99px; }
.cards { display: flex; flex-direction: column; gap: 6px; min-height: 60px; padding: 2px; border-radius: var(--r-sm); transition: background 0.2s; }
.cards.over { background: var(--accent-dim); outline: 1.5px dashed rgba(96,165,250,0.3); outline-offset: -2px; }
.card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--g3); cursor: grab; transition: all 0.2s var(--ease); }
.card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.card:active { cursor: grabbing; transform: scale(0.98); }
.card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.card.done { opacity: 0.45; }
.card.done:hover { opacity: 1; }
.card.overdue { border-color: rgba(239,68,68,0.3); }
.card.overdue:hover { border-color: rgba(239,68,68,0.5); box-shadow: var(--shadow-md); }
.card-id { font-size: 10px; font-weight: 600; color: var(--accent); font-family: 'SF Mono', 'Fira Code', monospace; margin-bottom: 3px; letter-spacing: 0.3px; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: var(--g2); line-height: 1.4; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: var(--g2); align-items: center; }
.card-foot { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-tertiary); margin-top: var(--g2); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; }
th:hover { color: var(--text-primary); }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
tr:hover td { background: var(--surface-2); }
tr { cursor: pointer; }

.gantt { position: relative; }
.gantt-row { display: flex; align-items: center; height: 36px; border-bottom: 1px solid var(--border); }
.gantt-label { width: 180px; flex-shrink: 0; padding-right: var(--g3); font-size: 11px; font-weight: 500; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gantt-track { flex: 1; position: relative; height: 100%; }
.gantt-bar { position: absolute; height: 20px; top: 8px; border-radius: 4px; background: var(--accent); font-size: 9px; color: #fff; padding: 0 6px; display: flex; align-items: center; cursor: move; z-index: 6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; box-shadow: var(--shadow-sm); transition: filter 0.15s; }
.gantt-bar:hover { filter: brightness(1.15); box-shadow: var(--shadow-md); }
.gantt-bar.epic-bar { background: var(--purple); height: 6px; top: 15px; cursor: default; }
.gantt-header { display: flex; border-bottom: 1px solid var(--border); padding-bottom: var(--g2); margin-bottom: var(--g2); }
.gantt-header-cell { flex: 1; text-align: center; font-size: 10px; font-weight: 600; color: var(--text-tertiary); }
.gantt-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); z-index: 5; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }
.cal-head { padding: 6px; text-align: center; font-size: 10px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; background: var(--surface-1); }
.cal-day { min-height: 80px; padding: 4px 6px; background: var(--surface-0); font-size: 10px; color: var(--text-tertiary); }
.cal-day.today { background: var(--accent-dim); }
.cal-day-num { font-weight: 600; margin-bottom: 2px; }
.cal-task { padding: 1px 4px; border-radius: 3px; font-size: 9px; margin-top: 1px; cursor: pointer; background: var(--accent-dim); color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-task.due { background: var(--yellow-dim); color: var(--yellow); }

.epic-block { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-lg); margin-bottom: var(--g3); overflow: hidden; }
.epic-hdr { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--purple-dim); }
.epic-hdr strong { font-size: 12px; color: var(--purple); }
.feat-block { margin-left: var(--g4); padding: 8px 14px; border-left: 2px solid var(--border); margin-top: 4px; }
.feat-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.feat-hdr strong { font-size: 12px; color: var(--text-primary); }
.story-row { padding: 6px 10px; background: var(--surface-0); border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 4px; font-size: 11px; color: var(--text-secondary); transition: background 0.15s var(--ease); }
.story-row:hover { background: var(--surface-2); border-color: rgba(255,255,255,0.1); }
.story-row .crit { font-size: 10px; color: var(--text-tertiary); margin-top: 3px; font-style: italic; line-height: 1.4; }

.analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--g4); }
.stat-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-lg); padding: var(--g4); }
.stat-card h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); margin-bottom: var(--g3); }
.stat-num { font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text-tertiary); margin-top: var(--g1); }
.chart-container { position: relative; height: 200px; }

.progress-bar { width: 100%; height: 4px; background: var(--surface-4); border-radius: 99px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.3s var(--ease); }
.progress-fill.warn { background: var(--yellow); }
.progress-fill.danger { background: var(--red); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-xl); width: 100%; max-width: 660px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 24px 48px rgba(0,0,0,0.4); animation: modalIn 0.2s var(--ease-spring); }
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-head { padding: var(--g4) var(--g5); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-head h3 { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 18px; padding: 4px; }
.modal-close:hover { color: var(--text-primary); }
.modal-body { padding: var(--g4) var(--g5); overflow-y: auto; flex: 1; }
.modal-foot { padding: var(--g3) var(--g5); border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: var(--g2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--g3); margin-bottom: var(--g3); }
.form-group { margin-bottom: var(--g3); }

.log-list { display: flex; flex-direction: column; gap: 2px; }
.log-item { display: flex; justify-content: space-between; padding: 6px 10px; border-radius: var(--r-sm); font-size: 12px; color: var(--text-secondary); }
.log-item:hover { background: var(--surface-2); }
.log-time { color: var(--text-tertiary); font-size: 10px; font-family: monospace; }

.toast { position: fixed; bottom: var(--g4); left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface-3); color: var(--text-primary); padding: 10px 20px; border-radius: var(--r-md); font-size: 12px; font-weight: 500; font-family: var(--font); border: 1px solid var(--border); transition: all 0.3s var(--ease-spring); z-index: 2000; box-shadow: var(--shadow-md); }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.toast.error { background: var(--red-dim); border-color: var(--red); color: var(--red); }

.dor-dod-banner { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-lg); padding: var(--g4); margin-bottom: var(--g4); }
.dor-dod-banner h3 { font-size: 16px; font-weight: 700; margin-bottom: var(--g1); }
.dor-dod-banner p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.checklist-progress-ring { display: flex; align-items: center; gap: var(--g4); margin-bottom: var(--g4); }
.ring-wrap { position: relative; width: 56px; height: 56px; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--surface-4); stroke-width: 4; }
.ring-fg { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s var(--ease); }
.ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-primary); }
.ring-label strong { display: block; font-size: 13px; }
.ring-label span { font-size: 11px; color: var(--text-tertiary); }
.checklist-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.checklist-card-head { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.checklist-card-head h4 { font-size: 12px; font-weight: 700; }
.checklist-card-body { padding: var(--g3); }
.cl-item { display: flex; align-items: center; gap: var(--g2); padding: 8px 10px; border-radius: var(--r-sm); cursor: pointer; transition: background 0.1s; }
.cl-item:hover { background: var(--surface-2); }
.cl-item.checked { opacity: 0.5; }
.cl-item.checked .cl-text { text-decoration: line-through; }
.cl-text { flex: 1; font-size: 12px; color: var(--text-primary); }
.cl-tag { font-size: 9px; font-weight: 600; text-transform: uppercase; padding: 1px 6px; border-radius: 99px; }
.add-cl-form { display: flex; gap: var(--g2); margin-top: var(--g3); padding-top: var(--g3); border-top: 1px solid var(--border); }
.add-cl-form .input { flex: 1; }

.sprint-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--g3); margin-bottom: var(--g4); }
.sprint-stat { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--g3); text-align: center; }
.sprint-stat .num { font-size: 24px; font-weight: 700; }
.sprint-stat .lbl { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }

.cmd-palette { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; display: none; align-items: flex-start; justify-content: center; padding-top: 120px; backdrop-filter: blur(4px); }
.cmd-palette.active { display: flex; }
.cmd-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-xl); width: 520px; max-height: 400px; overflow: hidden; box-shadow: 0 24px 48px rgba(0,0,0,0.5); animation: modalIn 0.15s var(--ease-spring); }
.cmd-input { width: 100%; padding: 14px 18px; border: none; border-bottom: 1px solid var(--border); background: transparent; color: var(--text-primary); font-size: 15px; font-family: var(--font); }
.cmd-input:focus { outline: none; }
.cmd-input::placeholder { color: var(--text-tertiary); }
.cmd-results { max-height: 340px; overflow-y: auto; padding: var(--g2); }
.cmd-item { padding: 8px 12px; border-radius: var(--r-sm); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-secondary); }
.cmd-item:hover, .cmd-item.active { background: var(--accent-dim); color: var(--text-primary); }
.cmd-item .cmd-key { font-size: 10px; color: var(--text-tertiary); font-family: monospace; background: var(--surface-3); padding: 1px 6px; border-radius: 3px; }
.cmd-item .cmd-label { font-size: 10px; color: var(--text-tertiary); }

.empty-state { text-align: center; padding: 48px 24px; color: var(--text-tertiary); font-size: 12px; border: 1.5px dashed var(--border); border-radius: var(--r-md); }

@media (max-width: 768px) {
    .sidebar { display: none; }
    .board { grid-template-columns: 1fr; }
    .sprint-stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="brand">
            <div class="brand-mark">P</div>
            <div class="brand-name">pkgdrop PM</div>
        </div>
        <div class="nav-group">
            <div class="nav-label">Views</div>
            <div class="nav-item active" id="nav-board" onclick="UI.go('board')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Board

<script>
const Store = {
    _listeners: [],
    state: { tasks: [], epics: [], feats: [], stories: [], logs: [], checklists: {}, sprint: null },
    schemaVersion: 2,

    async init() {
        try {
            await this._openDB();
            await this._loadAll();
            this._migrate();
        } catch(e) {
            console.error('IndexedDB init failed, falling back to localStorage', e);
            this._loadFromLS();
        }
    },

    _openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open('pkgdrop-pm', this.schemaVersion);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('tasks')) db.createObjectStore('tasks', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('epics')) db.createObjectStore('epics', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('feats')) db.createObjectStore('feats', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('stories')) db.createObjectStore('stories', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('logs')) { const s = db.createObjectStore('logs', { keyPath: 'id', autoIncrement: true }); s.createIndex('time', 'time'); }
                if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta', { keyPath: 'key' });
            };
            req.onsuccess = (e) => { this._db = e.target.result; resolve(); };
            req.onerror = (e) => reject(e.target.error);
        });
    },

    _tx(store, mode) {
        return this._db.transaction(store, mode).objectStore(store);
    },

    _getAll(store) {
        return new Promise((resolve, reject) => {
            const req = this._tx(store, 'readonly').getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    },

    _put(store, data) {
        return new Promise((resolve, reject) => {
            const req = this._tx(store, 'readwrite').put(data);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    },

    _delete(store, key) {
        return new Promise((resolve, reject) => {
            const req = this._tx(store, 'readwrite').delete(key);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    },

    async _loadAll() {
        this.state.tasks = await this._getAll('tasks');
        this.state.epics = await this._getAll('epics');
        this.state.feats = await this._getAll('feats');
        this.state.stories = await this._getAll('stories');
        this.state.logs = (await this._getAll('logs')).sort((a,b) => b.id - a.id);
        const meta = await this._getAll('meta');
        meta.forEach(m => {
            if (m.key === 'checklists') this.state.checklists = m.value;
            if (m.key === 'sprint') this.state.sprint = m.value;
            if (m.key === 'schemaVersion') this._savedVersion = m.value;
        });
    },

    _migrate() {
        if (!this._savedVersion || this._savedVersion < this.schemaVersion) {
            this._put('meta', { key: 'schemaVersion', value: this.schemaVersion });
        }
    },

    _loadFromLS() {
        try {
            this.state.tasks = JSON.parse(localStorage.getItem('pd-tasks') || '[]');
            this.state.epics = JSON.parse(localStorage.getItem('pd-epics') || '[]');
            this.state.feats = JSON.parse(localStorage.getItem('pd-feats') || '[]');
            this.state.stories = JSON.parse(localStorage.getItem('pd-stories') || '[]');
            this.state.logs = JSON.parse(localStorage.getItem('pd-logs') || '[]');
            this.state.checklists = JSON.parse(localStorage.getItem('pd-checklists') || '{}');
            this.state.sprint = JSON.parse(localStorage.getItem('pd-sprint') || 'null');
        } catch(e) { console.error('localStorage fallback failed', e); }
    },

    async save() {
        try {
            for (const t of this.state.tasks) await this._put('tasks', t);
            for (const e of this.state.epics) await this._put('epics', e);
            for (const f of this.state.feats) await this._put('feats', f);
            for (const s of this.state.stories) await this._put('stories', s);
            for (const l of this.state.logs.slice(0, 100)) await this._put('logs', l);
            await this._put('meta', { key: 'checklists', value: this.state.checklists });
            await this._put('meta', { key: 'sprint', value: this.state.sprint });
        } catch(e) {
            console.error('IndexedDB save failed, falling back to localStorage', e);
            ['tasks','epics','feats','stories','logs'].forEach(k => localStorage.setItem('pd-' + k, JSON.stringify(this.state[k])));
            localStorage.setItem('pd-checklists', JSON.stringify(this.state.checklists));
            localStorage.setItem('pd-sprint', JSON.stringify(this.state.sprint));
        }
        this._notify();
    },

    _notify() { this._listeners.forEach(fn => fn()); },
    onChange(fn) { this._listeners.push(fn); },

    addTask(t) {
        t.id = 'PKGD-' + (100 + this.state.tasks.length);
        t.checklist = t.checklist || [];
        t.ac = t.ac || '';
        t.comments = t.comments || [];
        t.createdAt = new Date().toISOString();
        this.state.tasks.push(t);
        this.audit('TASK_CREATED', t.id, t.title);
        this.save();
    },

    updateTask(id, d) {
        const i = this.state.tasks.findIndex(t => t.id === id);
        if (i !== -1) {
            const old = { ...this.state.tasks[i] };
            this.state.tasks[i] = { ...this.state.tasks[i], ...d };
            if (d.status && d.status !== old.status) this.audit('STATUS_CHANGED', id, `${old.status} → ${d.status}`);
            this.save();
        }
    },

    deleteTask(id) {
        const t = this.state.tasks.find(t => t.id === id);
        this.state.tasks = this.state.tasks.filter(t => t.id !== id);
        if (t) this.audit('TASK_DELETED', id, t.title);
        this.save();
    },

    audit(action, taskId, detail) {
        this.state.logs.unshift({
            id: Date.now(),
            time: new Date().toISOString(),
            action: action,
            taskId: taskId,
            detail: detail || '',
            agent: 'user'
        });
    },

                {id:'dod-3',text:'Unit tests written and passing',tag:'required',checked:false},
                {id:'dod-4',text:'Integration tests passing',tag:'required',checked:false},
                {id:'dod-5',text:'No linting warnings',tag:'required',checked:false},

                {id:'dod-12',text:'DB migrations tested with rollback',tag:'optional',checked:false},

            ],

                {id:'qa-1',text:'Test plan reviewed and approved',tag:'required',checked:false},

    getChecklist(key) {
        if (!this.state.checklists[key]) this.state.checklists[key] = this.getDefaultChecklists()[key] || [];
        return this.state.checklists[key];
    },

    toggleCheck(key, id) {
        const cl = this.getChecklist(key);
        const item = cl.find(c => c.id === id);
        if (item) item.checked = !item.checked;
        this.state.checklists[key] = cl;
        this.audit('CHECKLIST_TOGGLE', key, `${id}: ${item ? item.checked : '?'}`);
        this.save();
    },

    addChecklistItem(key, text, tag) {
        const cl = this.getChecklist(key);
        cl.push({ id: key + '-' + Date.now(), text, tag: tag || 'optional', checked: false });
        this.state.checklists[key] = cl;
        this.save();
    },

    removeChecklistItem(key, id) {
        this.state.checklists[key] = this.getChecklist(key).filter(c => c.id !== id);
        this.save();
    },

    exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(this.state, null, 2)], { type: 'application/json' }));
        a.download = 'pkgdrop-export.json';
        a.click();
    },

    reset() {
        document.getElementById('confirm-title').textContent = 'Reset All Data';
        document.getElementById('confirm-msg').textContent = 'This will permanently delete all tasks, epics, features, and stories. This cannot be undone.';
        document.getElementById('m-confirm').classList.add('active');
        document.getElementById('confirm-ok').onclick = async () => {
            try {
                const tx = this._db.transaction(['tasks','epics','feats','stories','logs','meta'], 'readwrite');
                ['tasks','epics','feats','stories','logs','meta'].forEach(s => tx.objectStore(s).clear());
            } catch(e) { localStorage.clear(); }
            location.reload();
        };
    }
};

const UI = {
    cur: 'board', editId: null, calDate: new Date(), sortKey: 'id', sortDir: 1, charts: {}, selId: null, cmdIdx: 0,

    async init() {
        await Store.init();
        this.initTheme();
        this.calDate.setDate(1);
        if (!Store.state.tasks.length) this.loadSample();
        this.setupKeys();
        Store.onChange(() => this.render());
        this.render();
    },

    initTheme() {
        const t = localStorage.getItem('pd-theme') || 'dark';
        document.body.classList.toggle('light', t === 'light');
        document.getElementById('theme-btn').textContent = t === 'light' ? 'Dark' : 'Light';
    },

    toggleTheme() {
        const l = document.body.classList.toggle('light');
        localStorage.setItem('pd-theme', l ? 'light' : 'dark');
        this.initTheme();
        if (this.cur === 'analytics') this.renderAnalytics();
    },

    go(v) {
        this.cur = v;
        document.querySelectorAll('.view').forEach(s => s.classList.remove('active'));
        document.getElementById('v-' + v).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const n = document.getElementById('nav-' + v);
        if (n) n.classList.add('active');
        this.render();
    },

    render() {
        const q = document.getElementById('search').value.toLowerCase();
        const tasks = Store.state.tasks.filter(t => t.title.toLowerCase().includes(q) || (t.owner || '').toLowerCase().includes(q));
        const renderers = {
            board: () => this.renderBoard(tasks),
            roadmap: () => this.renderGantt(tasks),
            calendar: () => this.renderCal(tasks),
            table: () => this.renderTable(tasks),
            backlog: () => this.renderBacklog(q),
            analytics: () => this.renderAnalytics(tasks),
            sprint: () => this.renderSprint(),
            dor: () => this.renderChecklist('dor', 'Definition of Ready', 'All items must be checked before a story enters a sprint.'),
            dod: () => this.renderChecklist('dod', 'Definition of Done', 'All items must be satisfied before work is shippable.'),
            qa: () => this.renderChecklist('qa', 'QA Checklist', 'Quality assurance verification steps.'),
            dev: () => this.renderChecklist('dev', 'Dev Checklist', 'Development best practices.'),
            sec: () => this.renderChecklist('sec', 'Security Checklist', 'Security audit items.'),
            devops: () => this.renderChecklist('devops', 'DevOps Checklist', 'Deployment and infrastructure readiness.'),
            log: () => this.renderLog()
        };
        (renderers[this.cur] || renderers.board)();
    },

    renderBoard(tasks) {
        const el = document.getElementById('v-board');
        let h = '<div class="board">';
        const today = new Date().toISOString().split('T')[0];
        ['todo', 'active', 'blocked', 'done'].forEach(s => {
            h += `<div class="col" data-s="${s}"><div class="col-head"><span class="col-title">${s[0].toUpperCase() + s.slice(1)}</span><span class="col-count">${tasks.filter(t => t.status === s).length}</span></div><div class="cards" data-s="${s}">`;
            const colTasks = tasks.filter(t => t.status === s);
            if (!colTasks.length) h += `<div class="empty-state">No tasks</div>`;
            colTasks.forEach(t => {
                const epic = Store.state.epics.find(e => e.id === t.epicId);
                const isOverdue = t.end && t.end < today && s !== 'done';
                const progress = t.checklist && t.checklist.length ? Math.round(t.checklist.filter(c => c.done).length / t.checklist.length * 100) : null;
                h += `<div class="card${s === 'done' ? ' done' : ''}${this.selId === t.id ? ' selected' : ''}${isOverdue ? ' overdue' : ''}" draggable="true" data-id="${t.id}" ondblclick="UI.openTask('${t.id}')" onclick="UI.selId='${t.id}';UI.render()"><div class="card-id">${this.esc(t.id)}</div><div class="card-title">${this.esc(t.title)}</div><div class="card-tags"><span class="tag tag-${t.priority}">${t.priority}</span>${epic ? `<span class="tag tag-epic">${this.esc(epic.title)}</span>` : ''}${isOverdue ? `<span style="font-size:9px;font-weight:700;color:var(--red)">OVERDUE</span>` : ''}</div>${progress !== null ? `<div class="progress-bar" style="margin-bottom:6px"><div class="progress-fill${progress < 40 ? ' danger' : progress < 80 ? ' warn' : ''}" style="width:${progress}%"></div></div><div style="font-size:9px;color:var(--text-tertiary);margin-bottom:4px">${progress}%</div>` : ''}<div class="card-foot"><span>${this.esc(t.owner || '\u2014')}</span><span>${t.end ? t.end.slice(5) : '\u2014'}</span></div></div>`;
            });
            h += '</div></div>';
        });
        el.innerHTML = h + '</div>';
        el.querySelectorAll('.cards').forEach(cl => {
            cl.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
            cl.ondragenter = () => cl.classList.add('over');
            cl.ondragleave = () => cl.classList.remove('over');
            cl.ondrop = e => { e.preventDefault(); cl.classList.remove('over'); Store.updateTask(e.dataTransfer.getData('tid'), { status: cl.dataset.s }); };
        });
        el.querySelectorAll('.card').forEach(c => {
            c.ondragstart = e => { e.dataTransfer.setData('tid', c.dataset.id); c.style.opacity = '0.5'; };
            c.ondragend = () => { c.style.opacity = ''; };
        });
    },

    renderGantt(tasks) {
        const el = document.getElementById('v-roadmap');
        if (!tasks.length) { el.innerHTML = '<div class="empty-state">No tasks with dates</div>'; return; }
        const dated = tasks.filter(t => t.start && t.end).sort((a, b) => a.start.localeCompare(b.start));
        if (!dated.length) { el.innerHTML = '<div class="empty-state">No tasks with start/end dates</div>'; return; }
        const minDate = new Date(dated[0].start);
        const maxDate = new Date(dated.reduce((m, t) => t.end > m ? t.end : m, dated[0].end));
        const totalDays = Math.max(1, Math.ceil((maxDate - minDate) / 86400000) + 1);
        const dayWidth = Math.max(30, Math.min(60, 800 / totalDays));
        let h = `<div class="gantt" style="min-width:${180 + totalDays * dayWidth}px">`;
        h += '<div class="gantt-header"><div style="width:180px;flex-shrink:0"></div>';
        for (let i = 0; i < totalDays; i++) {
            const d = new Date(minDate);
            d.setDate(d.getDate() + i);
            const label = d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
            h += `<div class="gantt-header-cell" style="width:${dayWidth}px">${label}</div>`;
        }
        h += '</div>';
        dated.forEach(t => {
            const startOff = Math.max(0, Math.ceil((new Date(t.start) - minDate) / 86400000));
            const dur = Math.max(1, Math.ceil((new Date(t.end) - new Date(t.start)) / 86400000) + 1);
            const left = startOff * dayWidth;
            const width = dur * dayWidth;
            h += `<div class="gantt-row"><div class="gantt-label">${this.esc(t.title)}</div><div class="gantt-track"><div class="gantt-bar" style="left:${left}px;width:${width}px" ondblclick="UI.openTask('${t.id}')">${this.esc(t.title)}</div></div></div>`;
        });
        el.innerHTML = h + '</div>';
    },

    renderCal(tasks) {
        const el = document.getElementById('v-calendar');
        const year = this.calDate.getFullYear();
        const month = this.calDate.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date().toISOString().split('T')[0];
        const dm = {};
        tasks.forEach(t => { if (t.end) { if (!dm[t.end]) dm[t.end] = []; dm[t.end].push(t); } });
        let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--g4)"><button class="btn btn-sm" onclick="UI.calDate.setMonth(UI.calDate.getMonth()-1);UI.render()">Prev</button><h3 style="font-size:15px;font-weight:700">${this.calDate.toLocaleDateString('en', { month: 'long', year: 'numeric' })}</h3><button class="btn btn-sm" onclick="UI.calDate.setMonth(UI.calDate.getMonth()+1);UI.render()">Next</button></div>`;
        h += '<div class="cal-grid">';
        ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(d => h += `<div class="cal-head">${d}</div>`);
        for (let i = 0; i < firstDay; i++) h += '<div class="cal-day"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = ds === today;
            h += `<div class="cal-day${isToday ? ' today' : ''}"><div class="cal-day-num">${d}</div>`;
            (dm[ds] || []).forEach(t => {
                const isOverdue = t.end < today && t.status !== 'done';
                h += `<div class="cal-task${isOverdue ? ' due' : ''}" onclick="UI.openTask('${t.id}')">${this.esc(t.title)}</div>`;
            });
            h += '</div>';
        }
        el.innerHTML = h + '</div>';
    },

    renderTable(tasks) {
        const sorted = [...tasks].sort((a, b) => (a[this.sortKey] > b[this.sortKey] ? 1 : -1) * this.sortDir);
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('v-table').innerHTML = `<div class="table-wrap"><table><thead><tr><th onclick="UI.sorts('id')">ID</th><th onclick="UI.sorts('title')">Title</th><th onclick="UI.sorts('status')">Status</th><th onclick="UI.sorts('priority')">Priority</th><th onclick="UI.sorts('owner')">Owner</th><th onclick="UI.sorts('end')">Due</th><th>Progress</th></tr></thead><tbody>${sorted.map(t => {
            const isOverdue = t.end && t.end < today && t.status !== 'done';
            const progress = t.checklist && t.checklist.length ? Math.round(t.checklist.filter(c => c.done).length / t.checklist.length * 100) : null;
            return `<tr onclick="UI.openTask('${t.id}')"><td style="font-family:monospace;font-size:10px;color:var(--accent)">${this.esc(t.id)}</td><td style="font-weight:600;color:var(--text-primary)">${this.esc(t.title)}</td><td><select class="input" style="padding:2px 20px 2px 6px;font-size:10px;width:auto" onclick="event.stopPropagation()" onchange="Store.updateTask('${t.id}',{status:this.value})">${['todo','active','blocked','done'].map(s => `<option value="${s}"${t.status === s ? ' selected' : ''}>${s}</option>`).join('')}</select></td><td><span class="tag tag-${t.priority}">${t.priority}</span></td><td style="color:var(--text-secondary)">${this.esc(t.owner || '\u2014')}</td><td style="color:${isOverdue ? 'var(--red)' : 'var(--text-tertiary)'};${isOverdue ? 'font-weight:600' : ''}">${t.end || '\u2014'}</td><td>${progress !== null ? `<div style="display:flex;align-items:center;gap:6px"><div class="progress-bar" style="width:60px"><div class="progress-fill${progress < 40 ? ' danger' : progress < 80 ? ' warn' : ''}" style="width:${progress}%"></div></div><span style="font-size:10px;color:var(--text-tertiary)">${progress}%</span></div>` : '\u2014'}</td></tr>`;
        }).join('')}</tbody></table></div>`;
    },

    renderBacklog(q) {
        const el = document.getElementById('v-backlog');
        const hasSearch = q && q.length > 0;
        let html = '';
        Store.state.epics.forEach(e => {
            const epicMatch = e.title.toLowerCase().includes(q);
            const matchingFeats = Store.state.feats.filter(f => f.epicId === e.id && (epicMatch || f.title.toLowerCase().includes(q)));
            const matchingStories = matchingFeats.flatMap(f => Store.state.stories.filter(s => s.featId === f.id && (epicMatch || f.title.toLowerCase().includes(q) || s.title.toLowerCase().includes(q))));
            if (hasSearch && !epicMatch && !matchingFeats.length) return;
            html += `<div class="epic-block"><div class="epic-hdr"><strong>${this.esc(e.title)}</strong><button class="btn btn-sm btn-ghost" onclick="UI.quickAdd('feat','${e.id}')">+ Feature</button></div>`;
            if (!matchingFeats.length) {
                Store.state.feats.filter(f => f.epicId === e.id).forEach(f => {
                    html += `<div class="feat-block"><div class="feat-hdr"><strong>${this.esc(f.title)}</strong><button class="btn btn-sm btn-ghost" onclick="UI.quickAdd('story','${f.id}')">+ Story</button></div>`;
                    Store.state.stories.filter(s => s.featId === f.id).forEach(s => {
                        html += `<div class="story-row"><div>${this.esc(s.title)}</div>${s.criteria ? `<div class="crit">${this.esc(s.criteria)}</div>` : ''}</div>`;
                    });
                    html += '</div>';
                });
            } else {
                matchingFeats.forEach(f => {
                    html += `<div class="feat-block"><div class="feat-hdr"><strong>${this.esc(f.title)}</strong><button class="btn btn-sm btn-ghost" onclick="UI.quickAdd('story','${f.id}')">+ Story</button></div>`;
                    Store.state.stories.filter(s => s.featId === f.id).forEach(s => {
                        const match = epicMatch || f.title.toLowerCase().includes(q) || s.title.toLowerCase().includes(q);
                        html += `<div class="story-row" style="${match && hasSearch ? 'border-color:var(--accent);background:var(--accent-dim)' : ''}"><div>${this.esc(s.title)}</div>${s.criteria ? `<div class="crit">${this.esc(s.criteria)}</div>` : ''}</div>`;
                    });
                    html += '</div>';
                });
            }
            html += '</div>';
        });
        el.innerHTML = html || '<div class="empty-state">No epics found</div>';
    },

    renderAnalytics(tasks) {
        const el = document.getElementById('v-analytics');
        const sc = { done: 0, active: 0, todo: 0, blocked: 0 };
        tasks.forEach(t => sc[t.status]++);
        const pc = { p0: 0, p1: 0, p2: 0 };
        tasks.forEach(t => pc[t.priority]++);
        const overdue = tasks.filter(t => t.end && t.end < new Date().toISOString().split('T')[0] && t.status !== 'done').length;
        const totalProgress = tasks.filter(t => t.checklist && t.checklist.length).reduce((sum, t) => sum + Math.round(t.checklist.filter(c => c.done).length / t.checklist.length * 100), 0);
        const avgProgress = tasks.filter(t => t.checklist && t.checklist.length).length ? Math.round(totalProgress / tasks.filter(t => t.checklist && t.checklist.length).length) : 0;
        let h = '<div class="analytics-grid">';
        h += `<div class="stat-card"><h4>Total Tasks</h4><div class="stat-num">${tasks.length}</div><div class="stat-sub">${sc.done} done, ${sc.active} active, ${sc.todo} todo, ${sc.blocked} blocked</div></div>`;
        h += `<div class="stat-card"><h4>Completion</h4><div class="stat-num">${tasks.length ? Math.round(sc.done / tasks.length * 100) : 0}%</div><div class="stat-sub">Avg progress: ${avgProgress}%</div></div>`;
        h += `<div class="stat-card"><h4>Overdue</h4><div class="stat-num" style="color:${overdue ? 'var(--red)' : 'var(--green)'}">${overdue}</div><div class="stat-sub">tasks past due date</div></div>`;
        h += `<div class="stat-card"><h4>Priority</h4><div class="stat-num">${pc.p0}</div><div class="stat-sub">P0 critical, ${pc.p1} P1 high, ${pc.p2} P2 normal</div></div>`;
        h += '</div>';
        h += '<div class="analytics-grid" style="margin-top:var(--g4)">';
        h += '<div class="stat-card"><h4>Status Distribution</h4><div class="chart-container"><canvas id="ch-s"></canvas></div></div>';
        h += '<div class="stat-card"><h4>Priority Breakdown</h4><div class="chart-container"><canvas id="ch-p"></canvas></div></div>';
        h += '</div>';
        el.innerHTML = h;
        if (typeof Chart !== 'undefined') {
            const tc = getComputedStyle(document.body).getPropertyValue('--text-tertiary').trim();
            if (this.charts.s) this.charts.s.destroy();
            if (this.charts.p) this.charts.p.destroy();
            this.charts.s = new Chart(document.getElementById('ch-s'), { type: 'doughnut', data: { labels: ['Done', 'Active', 'Todo', 'Blocked'], datasets: [{ data: [sc.done, sc.active, sc.todo, sc.blocked], backgroundColor: ['#22c55e', '#eab308', '#3b82f6', '#ef4444'], borderWidth: 0 }] }, options: { plugins: { legend: { labels: { color: tc, font: { family: 'Inter', size: 11 } } } }, cutout: '68%' } });
            this.charts.p = new Chart(document.getElementById('ch-p'), { type: 'bar', data: { labels: ['P0', 'P1', 'P2'], datasets: [{ data: [pc.p0, pc.p1, pc.p2], backgroundColor: ['#ef4444', '#eab308', '#64748b'], borderRadius: 4, barThickness: 28 }] }, options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: tc, font: { family: 'Inter' } }, grid: { color: 'rgba(255,255,255,0.06)' } }, x: { ticks: { color: tc, font: { family: 'Inter' } }, grid: { display: false } } } } });
        }
    },

    renderSprint() {
        const el = document.getElementById('v-sprint');
        const tasks = Store.state.tasks;
        const today = new Date().toISOString().split('T')[0];
        const sprint = Store.state.sprint || { name: 'Sprint 1', start: '2026-06-01', end: '2026-06-14' };
        const active = tasks.filter(t => t.status === 'active');
        const todo = tasks.filter(t => t.status === 'todo');
        const done = tasks.filter(t => t.status === 'done');
        const blocked = tasks.filter(t => t.status === 'blocked');
        const overdue = tasks.filter(t => t.end && t.end < today && t.status !== 'done');
        let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--g4)"><div><h3 style="font-size:16px;font-weight:700">${this.esc(sprint.name)}</h3><p style="font-size:11px;color:var(--text-tertiary)">${sprint.start} to ${sprint.end}</p></div><button class="btn btn-sm" onclick="UI.editSprint()">Edit Sprint</button></div>`;
        h += '<div class="sprint-stats">';
        h += `<div class="sprint-stat"><div class="num" style="color:var(--accent)">${active.length}</div><div class="lbl">Active</div></div>`;
        h += `<div class="sprint-stat"><div class="num" style="color:var(--yellow)">${todo.length}</div><div class="lbl">To Do</div></div>`;
        h += `<div class="sprint-stat"><div class="num" style="color:var(--green)">${done.length}</div><div class="lbl">Done</div></div>`;
        h += `<div class="sprint-stat"><div class="num" style="color:var(--red)">${blocked.length + overdue.length}</div><div class="lbl">Blocked / Overdue</div></div>`;
        h += '</div>';
        h += '<div class="board">';
        ['active', 'todo', 'blocked', 'done'].forEach(s => {
            const colTasks = tasks.filter(t => t.status === s);
            h += `<div class="col" data-s="${s}"><div class="col-head"><span class="col-title">${s[0].toUpperCase() + s.slice(1)}</span><span class="col-count">${colTasks.length}</span></div><div class="cards" data-s="${s}">`;
            colTasks.forEach(t => {
                const isOverdue = t.end && t.end < today && s !== 'done';
                h += `<div class="card${s === 'done' ? ' done' : ''}${isOverdue ? ' overdue' : ''}" draggable="true" data-id="${t.id}" ondblclick="UI.openTask('${t.id}')"><div class="card-id">${this.esc(t.id)}</div><div class="card-title">${this.esc(t.title)}</div><div class="card-tags"><span class="tag tag-${t.priority}">${t.priority}</span>${isOverdue ? `<span style="font-size:9px;font-weight:700;color:var(--red)">OVERDUE</span>` : ''}</div><div class="card-foot"><span>${this.esc(t.owner || '\u2014')}</span><span>${t.end ? t.end.slice(5) : '\u2014'}</span></div></div>`;
            });
            h += '</div></div>';
        });
        h += '</div>';
        el.innerHTML = h;
        el.querySelectorAll('.cards').forEach(cl => {
            cl.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
            cl.ondragenter = () => cl.classList.add('over');
            cl.ondragleave = () => cl.classList.remove('over');
            cl.ondrop = e => { e.preventDefault(); cl.classList.remove('over'); Store.updateTask(e.dataTransfer.getData('tid'), { status: cl.dataset.s }); };
        });
        el.querySelectorAll('.card').forEach(c => {
            c.ondragstart = e => { e.dataTransfer.setData('tid', c.dataset.id); c.style.opacity = '0.5'; };
            c.ondragend = () => { c.style.opacity = ''; };
        });
    },

    renderChecklist(key, title, desc) {
        const el = document.getElementById('v-' + key);
        const cl = Store.getChecklist(key);
        const done = cl.filter(c => c.checked).length;
        const pct = cl.length ? Math.round(done / cl.length * 100) : 0;
        const circ = 2 * Math.PI * 22;
        const offset = circ - (pct / 100) * circ;
        const color = pct >= 80 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
        let h = `<div class="dor-dod-banner"><h3>${title}</h3><p>${desc}</p></div>`;
        h += `<div class="checklist-progress-ring"><div class="ring-wrap"><svg width="56" height="56"><circle class="ring-bg" cx="28" cy="28" r="22"/><circle class="ring-fg" cx="28" cy="28" r="22" stroke="${color}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/></svg><div class="ring-pct">${pct}%</div></div><div class="ring-label"><strong>${done} of ${cl.length} complete</strong><span>${cl.length - done} remaining</span></div></div>`;
        h += `<div class="checklist-card"><div class="checklist-card-head"><h4>Items</h4></div><div class="checklist-card-body">`;
        cl.forEach(c => {
            h += `<div class="cl-item${c.checked ? ' checked' : ''}" onclick="Store.toggleCheck('${key}','${c.id}')"><input type="checkbox"${c.checked ? ' checked' : ''} onclick="event.stopPropagation();Store.toggleCheck('${key}','${c.id}')"><span class="cl-text">${this.esc(c.text)}</span><span class="cl-tag tag-${c.tag}">${c.tag}</span></div>`;
        });
        h += `<div class="add-cl-form"><input class="input" id="add-cl-${key}" placeholder="Add new item..." onkeydown="if(event.key==='Enter'){Store.addChecklistItem('${key}',this.value);this.value='';UI.render()}"><select class="input" style="width:90px" id="add-cl-tag-${key}"><option value="optional">Optional</option><option value="required">Required</option><option value="auto">Auto</option></select><button class="btn btn-primary btn-sm" onclick="Store.addChecklistItem('${key}',document.getElementById('add-cl-${key}').value,document.getElementById('add-cl-tag-${key}').value);document.getElementById('add-cl-${key}').value='';UI.render()">Add</button></div>`;
        h += '</div></div>';
        el.innerHTML = h;
    },

    renderLog() {
        const el = document.getElementById('v-log');
        const logs = Store.state.logs.slice(0, 50);
        if (!logs.length) { el.innerHTML = '<div class="empty-state">No activity yet</div>'; return; }
        let h = '<div class="log-list">';
        logs.forEach(l => {
            const time = l.time ? new Date(l.time).toLocaleString() : l.time || '';
            h += `<div class="log-item"><span><strong style="color:var(--accent)">${this.esc(l.action || '')}</strong> ${this.esc(l.taskId || '')} ${this.esc(l.detail || l.msg || '')}</span><span class="log-time">${time}</span></div>`;
        });
        el.innerHTML = h + '</div>';
    },

    sorts(key) {
        if (this.sortKey === key) this.sortDir *= -1;
        else { this.sortKey = key; this.sortDir = 1; }
        this.render();
    },

    openTask(id) {
        this.editId = id || null;
        const t = id ? Store.state.tasks.find(t => t.id === id) : null;
        document.getElementById('modal-title').textContent = t ? 'Edit Task' : 'New Task';
        document.getElementById('f-title').value = t ? t.title : '';
        document.getElementById('f-desc').value = t ? (t.desc || '') : '';
        document.getElementById('f-ac').value = t ? (t.ac || '') : '';
        document.getElementById('f-status').value = t ? t.status : 'todo';
        document.getElementById('f-priority').value = t ? t.priority : 'p2';
        document.getElementById('f-owner').value = t ? (t.owner || '') : '';
        document.getElementById('f-start').value = t ? (t.start || '') : '';
        document.getElementById('f-end').value = t ? (t.end || '') : '';
        document.getElementById('delete-btn').style.display = t ? '' : 'none';
        const epSel = document.getElementById('f-epic');
        epSel.innerHTML = '<option value="">None</option>' + Store.state.epics.map(e => `<option value="${e.id}"${t && t.epicId === e.id ? ' selected' : ''}>${this.esc(e.title)}</option>`).join('');
        const clDiv = document.getElementById('f-checklist');
        clDiv.innerHTML = '';
        if (t && t.checklist) t.checklist.forEach((c, i) => this._addCheckItemHTML(clDiv, c.text, c.done));
        document.getElementById('f-comments').innerHTML = t && t.comments ? t.comments.map(c => `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-secondary)">${this.esc(c)}</div>`).join('') : '';
        document.getElementById('m-task').classList.add('active');
        setTimeout(() => document.getElementById('f-title').focus(), 100);
    },

    _addCheckItemHTML(div, text, done) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:6px;margin-bottom:4px;align-items:center';
        row.innerHTML = `<input type="checkbox"${done ? ' checked' : ''} style="flex-shrink:0"><input class="input" value="${this.esc(text || '')}" placeholder="Checklist item" style="flex:1"><button class="btn btn-sm btn-ghost" onclick="this.parentElement.remove()">&times;</button>`;
        div.appendChild(row);
    },

    addCheckItem() {
        this._addCheckItemHTML(document.getElementById('f-checklist'), '', false);
    },

    saveTask() {
        const d = {
            title: document.getElementById('f-title').value.trim(),
            desc: document.getElementById('f-desc').value,
            ac: document.getElementById('f-ac').value,
            status: document.getElementById('f-status').value,
            priority: document.getElementById('f-priority').value,
            owner: document.getElementById('f-owner').value,
            start: document.getElementById('f-start').value,
            end: document.getElementById('f-end').value,
            epicId: document.getElementById('f-epic').value,
            checklist: Array.from(document.getElementById('f-checklist').children).map(c => ({
                text: c.querySelector('input[type=text]').value,
                done: c.querySelector('input[type=checkbox]').checked
            }))
        };
        if (!d.title) { this.toast('Title required', 'error'); return; }
        if (this.editId) Store.updateTask(this.editId, d);
        else Store.addTask(d);
        this.closeModal();
        this.toast('Saved', 'success');
    },

    deleteTask() {
        document.getElementById('confirm-title').textContent = 'Delete Task';
        document.getElementById('confirm-msg').textContent = 'Remove this task?';
        document.getElementById('m-confirm').classList.add('active');
        document.getElementById('confirm-ok').onclick = () => {
            Store.deleteTask(this.editId);
            this.closeModal();
            this.toast('Deleted', 'error');
        };
    },

    closeModal() {
        document.getElementById('m-task').classList.remove('active');
        this.editId = null;
    },

    quickAdd(type, pid) {
        const title = prompt(type === 'feat' ? 'Feature name:' : 'Story name:');
        if (!title) return;
        if (type === 'feat') Store.state.feats.push({ id: 'F-' + (100 + Store.state.feats.length), epicId: pid, title });
        if (type === 'story') Store.state.stories.push({ id: 'S-' + (100 + Store.state.stories.length), featId: pid, title, criteria: '' });
        Store.audit(type === 'feat' ? 'FEATURE_ADDED' : 'STORY_ADDED', pid, title);
        Store.save();
        this.toast(type === 'feat' ? 'Feature added' : 'Story added', 'success');
    },

    editSprint() {
        const s = Store.state.sprint || { name: 'Sprint 1', start: '2026-06-01', end: '2026-06-14' };
        const name = prompt('Sprint name:', s.name);
        if (!name) return;
        const start = prompt('Start date (YYYY-MM-DD):', s.start);
        if (!start) return;
        const end = prompt('End date (YYYY-MM-DD):', s.end);
        if (!end) return;
        Store.state.sprint = { name, start, end };
        Store.audit('SPRINT_UPDATED', name, `${start} to ${end}`);
        Store.save();
        this.toast('Sprint updated', 'success');
    },

    toast(m, type) {
        const t = document.getElementById('toast');
        t.textContent = m;
        t.className = 'toast show' + (type ? ' ' + type : '');
        setTimeout(() => t.classList.remove('show'), 2500);
    },

    setupKeys() {
        window.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); this.openCmd(); return; }
            if (e.key === 'Escape') { this.closeModal(); this.closeCmd(); }
            if (e.key === 'n' || e.key === 'N') { e.preventDefault(); this.openTask(); }
            if (e.key === '1') this.go('board');
            if (e.key === '2') this.go('roadmap');
            if (e.key === '3') this.go('calendar');
            if (e.key === '4') this.go('table');
            if (e.key === '5') this.go('backlog');
            if (e.key === '6') this.go('analytics');
            if (e.key === 's' || e.key === 'S') this.go('sprint');
            if (e.key === 'd' || e.key === 'D') { e.preventDefault(); if (e.shiftKey) this.go('dod'); else this.go('dor'); }
            if (e.key === 'f' || e.key === 'F') this.go('qa');
            if (e.key === 'g' || e.key === 'G') this.go('dev');
            if (e.key === 'h' || e.key === 'H') this.go('sec');
            if (e.key === 'j' || e.key === 'J') this.go('devops');
            if (e.key === '/' || e.key === '?') { e.preventDefault(); document.getElementById('search').focus(); }
        });
    },

    esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; },

    openCmd() {
        this.cmdIdx = 0;
        document.getElementById('cmd-palette').classList.add('active');
        const inp = document.getElementById('cmd-input');
        inp.value = '';
        inp.focus();
        this.filterCmd();
    },

    closeCmd() { document.getElementById('cmd-palette').classList.remove('active'); },

    cmdKey(e) {
        const items = document.querySelectorAll('#cmd-results .cmd-item');
        if (e.key === 'ArrowDown') { e.preventDefault(); this.cmdIdx = Math.min(this.cmdIdx + 1, items.length - 1); this._highlightCmd(items); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); this.cmdIdx = Math.max(this.cmdIdx - 1, 0); this._highlightCmd(items); }
        else if (e.key === 'Enter') { e.preventDefault(); if (items[this.cmdIdx]) items[this.cmdIdx].click(); }
    },

    _highlightCmd(items) {
        items.forEach((it, i) => it.classList.toggle('active', i === this.cmdIdx));
        if (items[this.cmdIdx]) items[this.cmdIdx].scrollIntoView({ block: 'nearest' });
    },

    filterCmd() {
        const q = document.getElementById('cmd-input').value.toLowerCase();
        const commands = [
            { label: 'New Task', key: 'N', action: () => this.openTask() },
            { label: 'Board View', key: '1', action: () => this.go('board') },
            { label: 'Roadmap View', key: '2', action: () => this.go('roadmap') },
            { label: 'Calendar View', key: '3', action: () => this.go('calendar') },
            { label: 'Table View', key: '4', action: () => this.go('table') },
            { label: 'Backlog View', key: '5', action: () => this.go('backlog') },
            { label: 'Analytics View', key: '6', action: () => this.go('analytics') },
            { label: 'Sprint Board', key: 'S', action: () => this.go('sprint') },
            { label: 'Definition of Ready', key: 'D', action: () => this.go('dor') },
            { label: 'Definition of Done', key: 'Shift+D', action: () => this.go('dod') },
            { label: 'QA Checklist', key: 'F', action: () => this.go('qa') },
            { label: 'Dev Checklist', key: 'G', action: () => this.go('dev') },
            { label: 'Security Checklist', key: 'H', action: () => this.go('sec') },
            { label: 'DevOps Checklist', key: 'J', action: () => this.go('devops') },
            { label: 'Activity Log', key: '', action: () => this.go('log') },
            { label: 'Toggle Theme', key: '', action: () => this.toggleTheme() },
            { label: 'Export Data', key: '', action: () => Store.exportData() },
            { label: 'Reset All Data', key: '', action: () => Store.reset() },
            { label: 'Search', key: '/', action: () => { this.closeCmd(); document.getElementById('search').focus(); } }
        ];
        const filtered = commands.filter(c => c.label.toLowerCase().includes(q));
        this.cmdIdx = 0;
        document.getElementById('cmd-results').innerHTML = filtered.map((c, i) => `<div class="cmd-item${i === 0 ? ' active' : ''}" onclick="UI.closeCmd();(${c.action.toString()})()"><span>${c.label}</span><span class="cmd-key">${c.key}</span></div>`).join('') || '<div style="padding:16px;text-align:center;color:var(--text-tertiary);font-size:12px">No commands found</div>';
    },
