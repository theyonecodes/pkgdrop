name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Syntax check
        run: bash -n src/pkgdrop

      - name: Shellcheck
        run: shellcheck src/pkgdrop
