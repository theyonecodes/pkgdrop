name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Make scripts executable
        run: chmod +x src/pkgdrop install.sh uninstall.sh push-aur.sh

      - name: Syntax check
        run: |
          bash -n src/pkgdrop
          bash -n install.sh
          bash -n uninstall.sh
          bash -n push-aur.sh

      - name: Shellcheck (error only)
        run: |
          shellcheck --severity=error src/pkgdrop
          shellcheck --severity=error install.sh
          shellcheck --severity=error uninstall.sh
          shellcheck --severity=error push-aur.sh

      - name: Unit tests
        run: bats tests/pkgdrop.bats

      - name: Validate help output
        run: |
          ./src/pkgdrop --help | grep -q "Usage:"
          ./src/pkgdrop --version | grep -q "pkgdrop 3.0.0"

      - name: Validate new commands exist
        run: |
          ./src/pkgdrop --help | grep -q "\-\-upgrade"
          ./src/pkgdrop --help | grep -q "\-\-info"
          ./src/pkgdrop --help | grep -q "\-\-owns"
          ./src/pkgdrop --help | grep -q "\-\-force"

      - name: Validate --dry-run
        run: |
          touch /tmp/test.xyz
          ./src/pkgdrop --dry-run /tmp/test.xyz 2>&1 || true

  test-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm jq bash git

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          /tmp/bats/install.sh /usr/local

      - name: Make scripts executable
        run: chmod +x src/pkgdrop

      - name: Syntax check
        run: bash -n src/pkgdrop

      - name: Unit tests
        run: bats tests/pkgdrop.bats

      - name: Integration tests
        run: bats tests/integration.bats

      - name: Validate version
        run: ./src/pkgdrop --version | grep -q "pkgdrop 3.0.0"
