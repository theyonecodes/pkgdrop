name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Make scripts executable
        run: chmod +x src/pkgdrop install.sh uninstall.sh push-aur.sh

      - name: Syntax check
        run: |
          bash -n src/pkgdrop
          bash -n install.sh
          bash -n uninstall.sh
          bash -n push-aur.sh

      - name: Shellcheck
        run: |
          shellcheck src/pkgdrop
          shellcheck install.sh
          shellcheck uninstall.sh
          shellcheck push-aur.sh

      - name: Unit tests
        run: bats tests/pkgdrop.bats

      - name: Validate help output
        run: |
          ./src/pkgdrop --help | grep -q "Usage:"
          ./src/pkgdrop --version | grep -q "pkgdrop"

      - name: Validate --dry-run
        run: |
          touch /tmp/test.xyz
          ./src/pkgdrop --dry-run /tmp/test.xyz 2>&1 || true
