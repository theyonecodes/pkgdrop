name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n src/pkgdrop
      - name: Shellcheck (if available)
        run: |
          if command -v shellcheck &>/dev/null; then
            shellcheck src/pkgdrop
          fi