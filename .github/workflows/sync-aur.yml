name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^VERSION=' src/pkgdrop | cut -d'"' -f2)
          echo "v=$VER" >> $GITHUB_OUTPUT

      - name: Sync to AUR
        run: |
          eval "$(ssh-agent -s)"
          git config --global url."git@aur.archlinux.org:".insteadOf "https://aur.archlinux.org/"
          
          git clone git@aur.archlinux.org:pkgdrop.git /tmp/aur-pkgdrop
          cd /tmp/aur-pkgdrop
          
          cp "$GITHUB_WORKSPACE/src/pkgdrop" .
          git add -A
          git commit -m "pkgdrop ${{ steps.ver.outputs.v }}" || echo "No changes"
          git push