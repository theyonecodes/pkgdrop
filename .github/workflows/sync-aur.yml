name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    environment: pkgdrop-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add AUR to known hosts
        run: ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^VERSION=' src/pkgdrop | cut -d'"' -f2)
          echo "v=$VER" >> $GITHUB_OUTPUT

      - name: Sync to AUR
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git clone ssh://aur@aur.archlinux.org/pkgdrop.git /tmp/aur
          cd /tmp/aur
          
          cp "$GITHUB_WORKSPACE/src/pkgdrop" .
          git add -A
          
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "pkgdrop ${{ steps.ver.outputs.v }}"
            git push
          fi
