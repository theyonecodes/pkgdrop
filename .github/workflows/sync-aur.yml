name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    environment: pkgdrop-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printenv AUR_SSH_KEY > ~/.ssh/aur_deploy
          chmod 600 ~/.ssh/aur_deploy
          ssh-keygen -l -f ~/.ssh/aur_deploy
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/aur_deploy
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config << 'SSHEOF'
Host aur.archlinux.org
  IdentityFile ~/.ssh/aur_deploy
  User aur
SSHEOF
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^VERSION=' src/pkgdrop | cut -d'"' -f2)
          echo "v=$VER" >> $GITHUB_OUTPUT

      - name: Sync to AUR
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone ssh://aur@aur.archlinux.org/pkgdrop.git /tmp/aur
          cd /tmp/aur

          cp "$GITHUB_WORKSPACE/src/pkgdrop" .
          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "pkgdrop ${{ steps.ver.outputs.v }}"
          git push
