name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    environment: pkgdrop-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^VERSION=' src/pkgdrop | cut -d'"' -f2)
          echo "v=$VER" >> $GITHUB_OUTPUT

      - name: Sync to AUR
        run: |
          set -ex
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Starting sync for version ${{ steps.ver.outputs.v }}..."

          # Use the standard AUR Git syntax: user@host:repo
          git clone aur@aur.archlinux.org:pkgdrop.git /tmp/aur || {
            echo "Clone failed. Retrying with StrictHostKeyChecking=no..."
            git -c core.sshCommand="ssh -o StrictHostKeyChecking=no" clone aur@aur.archlinux.org:pkgdrop.git /tmp/aur
          }
          
          cd /tmp/aur
          echo "Current directory: $(pwd)"
          echo "Remote: $(git remote -v)"
          
          cp "$GITHUB_WORKSPACE/src/pkgdrop" .
          git add -A
          
          if git diff --cached --quiet; then
            echo "No changes to push."
          else
            echo "Changes detected. Committing..."
            git commit -m "pkgdrop ${{ steps.ver.outputs.v }}"
            echo "Pushing to AUR..."
            git push origin master || git push origin main
            echo "Successfully pushed to AUR!"
          fi
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
