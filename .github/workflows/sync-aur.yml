name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    environment: pkgdrop-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur_deploy
          chmod 600 ~/.ssh/aur_deploy
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/aur_deploy
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^VERSION=' src/pkgdrop | cut -d'"' -f2)
          echo "v=$VER" >> $GITHUB_OUTPUT

      - name: Sync to AUR
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."git@aur.archlinux.org:".insteadOf "https://aur.archlinux.org/"

          git clone git@aur.archlinux.org:pkgdrop.git /tmp/aur
          cd /tmp/aur

          cp "$GITHUB_WORKSPACE/src/pkgdrop" .
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "pkgdrop ${{ steps.ver.outputs.v }}"
          git push
