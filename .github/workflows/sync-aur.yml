name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    environment: pkgdrop-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify secret exists
        run: |
          if [ -z "${{ secrets.AUR_SSH_KEY }}" ]; then
            echo "::error::AUR_SSH_KEY secret is empty or not set"
            exit 1
          fi
          echo "Secret is set"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^VERSION=' src/pkgdrop | cut -d'"' -f2)
          echo "v=$VER" >> $GITHUB_OUTPUT

      - name: Test SSH
        run: ssh -T git@aur.archlinux.org || true

      - name: Sync to AUR
        run: |
          git config --global url."git@aur.archlinux.org:".insteadOf "https://aur.archlinux.org/"

          git clone git@aur.archlinux.org:pkgdrop.git /tmp/aur
          cd /tmp/aur

          cp "$GITHUB_WORKSPACE/src/pkgdrop" .
          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "pkgdrop ${{ steps.ver.outputs.v }}"
          git push
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
