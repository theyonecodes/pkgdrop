name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    environment: pkgdrop-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secret
        run: |
          echo "Secret length: ${{ secrets.AUR_SSH_KEY }}" | wc -c
          if [ -z "${{ secrets.AUR_SSH_KEY }}" ]; then
            echo "::error::AUR_SSH_KEY is empty!"
          else
            echo "AUR_SSH_KEY is set"
          fi
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
