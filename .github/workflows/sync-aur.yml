name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    environment: pkgdrop-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Get version
        id: ver
        run: |
          VER=$(grep '^VERSION=' src/pkgdrop | cut -d'"' -f2)
          echo "v=$VER" >> $GITHUB_OUTPUT

      - name: Sync to AUR
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Starting sync for version ${{ steps.ver.outputs.v }}..."

          # 1. Clone the repository using the unambiguous SSH URL
          git clone ssh://aur@aur.archlinux.org/pkgdrop.git /tmp/aur || {
            echo "Error: Failed to clone AUR repository."
            exit 1
          }
          
          cd /tmp/aur
          echo "Cloned AUR repository to $(pwd)"

          # 2. Update the package file
          cp "$GITHUB_WORKSPACE/src/pkgdrop" .
          git add -A
          
          # 3. Commit and push if there are changes
          if git diff --cached --quiet; then
            echo "No changes detected. Nothing to push."
          else
            echo "Changes detected. Committing and pushing..."
            git commit -m "pkgdrop ${{ steps.ver.outputs.v }}"
            git push origin master || git push origin main
            echo "Successfully pushed to AUR!"
          fi
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
