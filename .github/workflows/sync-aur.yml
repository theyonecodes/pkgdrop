name: Sync to AUR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    environment: pkgdrop-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check key format
        run: |
          echo "First char: $(printenv AUR_SSH_KEY | head -c 1)"
          echo "Has BEGIN: $(printenv AUR_SSH_KEY | grep -c 'BEGIN')"
          echo "Has END: $(printenv AUR_SSH_KEY | grep -c 'END')"
          printenv AUR_SSH_KEY | wc -l
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
