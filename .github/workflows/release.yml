name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate scripts
        run: |
          bash -n src/pkgdrop
          bash -n install.sh
          bash -n uninstall.sh
          bash -n push-aur.sh

      - name: Generate archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          git archive --format=tar.gz --prefix=pkgdrop-${VERSION}/ -o pkgdrop-${VERSION}.tar.gz HEAD

      - name: Generate checksums
        run: |
          sha256sum pkgdrop-${VERSION}.tar.gz > pkgdrop-${VERSION}.tar.gz.sha256
          cat pkgdrop-${VERSION}.tar.gz.sha256

      - name: Upload release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            pkgdrop-${VERSION}.tar.gz
            pkgdrop-${VERSION}.tar.gz.sha256
          generate_release_notes: true
